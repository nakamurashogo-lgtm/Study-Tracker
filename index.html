<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Study Log</title>
  
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Study%20Log%22%2C%22short_name%22%3A%22Study%20Log%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%234f46e5%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%2C%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Study Log">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f8fafc; }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    /* iOSでの長押し時の選択メニュー防止 */
    .no-callout { -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; }
    /* モーダル表示時の背景スクロール防止 */
    body.modal-open { overflow: hidden; }
  </style>
</head>
<body class="text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 定数設定 ---
    const SUBJECT_COLORS = {
      '英語': '#ec4899', '数学': '#3b82f6', '理科': '#22c55e', 
      '社会': '#f97316', '国語': '#a855f7', 'その他': '#9ca3af',
    };
    const SUBJECTS = Object.keys(SUBJECT_COLORS);

    const EVENT_COLORS = [
      { id: 'red', color: '#ef4444', label: '赤' },
      { id: 'pink', color: '#ec4899', label: 'ピンク' },
      { id: 'blue', color: '#3b82f6', label: '青' },
      { id: 'cyan', color: '#0ea5e9', label: '水色' },
      { id: 'green', color: '#22c55e', label: '緑' },
      { id: 'lime', color: '#84cc16', label: '黄緑' },
      { id: 'orange', color: '#f97316', label: 'オレンジ' },
      { id: 'yellow', color: '#eab308', label: '黄色' },
      { id: 'purple', color: '#9333ea', label: '紫' },
      { id: 'lightpurple', color: '#d8b4fe', label: '薄紫' },
      { id: 'gray', color: '#64748b', label: 'グレー' },
      { id: 'black', color: '#0f172a', label: '黒' },
    ];
    
    const STORAGE_PREFIX = 'study_tracker_v4_';
    
    const getLocalDateString = (date) => {
      const d = new Date(date);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    };

    // --- アイコンコンポーネント ---
    const Icon = ({ name, size = 24, className = '', ...props }) => {
      useEffect(() => { lucide.createIcons(); });
      return <i data-lucide={name} style={{ width: size, height: size }} className={className} {...props}></i>;
    };

    // --- メインアプリ ---
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [materials, setMaterials] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'materials')) || []);
      const [records, setRecords] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'records')) || []);
      const [events, setEvents] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'events')) || []);
      const [weeklyGoalHours, setWeeklyGoalHours] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'goal')) || 20);

      // プロフィール用のState追加
      const defaultUserProfile = { grade: '', classNum: '', studentNum: '', name: '' };
      const [userProfile, setUserProfile] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'userProfile')) || defaultUserProfile);

      // フォーム設定用のState追加
      const defaultFormSettings = { 
        baseUrl: '', 
        entryIdTotal: '', 
        entryIdsSubjects: { '英語': '', '数学': '', '理科': '', '社会': '', '国語': '', 'その他': '' },
        entryIdsProfile: { grade: '', classNum: '', studentNum: '', name: '' }
      };
      const [formSettings, setFormSettings] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'formSettings')) || defaultFormSettings);

      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'materials', JSON.stringify(materials)); }, [materials]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'records', JSON.stringify(records)); }, [records]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'events', JSON.stringify(events)); }, [events]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'goal', JSON.stringify(weeklyGoalHours)); }, [weeklyGoalHours]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'userProfile', JSON.stringify(userProfile)); }, [userProfile]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'formSettings', JSON.stringify(formSettings)); }, [formSettings]);

      const addRecord = (materialId, durationSeconds, customDateStr = null) => {
        let recordDate = new Date();
        if (customDateStr) { recordDate = new Date(`${customDateStr}T12:00:00`); }
        const newRecord = { id: Date.now().toString(), materialId, durationSeconds, date: recordDate.toISOString() };
        setRecords([newRecord, ...records]);
      };

      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard': return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} userProfile={userProfile} />;
          case 'record': return <Record materials={materials} addRecord={addRecord} />;
          case 'calendar': return <Calendar records={records} materials={materials} events={events} setEvents={setEvents} />;
          case 'materials': return <MaterialsManager materials={materials} setMaterials={setMaterials} />;
          case 'settings': return <Settings records={records} setRecords={setRecords} materials={materials} setMaterials={setMaterials} events={events} setEvents={setEvents} goal={weeklyGoalHours} setGoal={setWeeklyGoalHours} formSettings={formSettings} setFormSettings={setFormSettings} userProfile={userProfile} setUserProfile={setUserProfile} />;
          default: return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} userProfile={userProfile} />;
        }
      };

      return (
        <div className="flex flex-col md:flex-row h-screen overflow-hidden">
          <nav className="glass-effect border-r md:w-64 flex-shrink-0 flex md:flex-col justify-between md:justify-start p-2 md:p-4 z-20 shadow-sm md:shadow-none order-last md:order-first border-t md:border-t-0">
            <div className="hidden md:flex items-center gap-3 mb-8 px-4 mt-4">
              <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                <Icon name="book-open" size={24} />
              </div>
              <h1 className="text-xl font-bold tracking-tight text-slate-800">Study Log</h1>
            </div>

            <div className="flex md:flex-col w-full justify-around md:justify-start gap-1 md:gap-2">
              {[
                { id: 'dashboard', icon: 'layout-dashboard', label: 'ホーム' },
                { id: 'record', icon: 'clock', label: '記録・タイマー' },
                { id: 'calendar', icon: 'calendar', label: 'カレンダー' },
                { id: 'materials', icon: 'library', label: '教材管理' },
                { id: 'settings', icon: 'settings', label: '設定・提出' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-4 rounded-2xl transition-all ${
                    activeTab === tab.id ? 'bg-indigo-50 text-indigo-700 font-bold shadow-sm' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'
                  }`}
                >
                  <Icon name={tab.icon} size={22} className={activeTab === tab.id ? 'text-indigo-600' : ''} />
                  <span className="text-[10px] md:text-sm">{tab.label}</span>
                </button>
              ))}
            </div>
          </nav>

          <main className="flex-1 overflow-y-auto bg-slate-50/50 p-4 md:p-8 relative">
            <div className="max-w-5xl mx-auto pb-20 md:pb-0">
              {renderContent()}
            </div>
          </main>
        </div>
      );
    }

    // --- グラフコンポーネント ---
    function StudyChart({ records, materials }) {
      const [view, setView] = useState('daily');
      const [offset, setOffset] = useState(0);

      useEffect(() => { setOffset(0); }, [view]);

      const chartData = useMemo(() => {
        if (view === 'daily') {
          const days = [];
          const DISPLAY_DAYS = 7;
          for(let i = DISPLAY_DAYS - 1; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - (offset * DISPLAY_DAYS + i));
            days.push(d);
          }
          return days.map(d => {
            const dateStr = getLocalDateString(d);
            const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);
            let total = 0; const subjects = {}; SUBJECTS.forEach(s => subjects[s] = 0);
            dayRecords.forEach(r => {
              const mat = materials.find(m => m.id === r.materialId);
              const sub = mat ? mat.subject : 'その他';
              if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;
              total += r.durationSeconds;
            });
            const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
            return { label: `${d.getMonth()+1}/${d.getDate()}(${dayOfWeek})`, total, subjects };
          });
        } else {
          const weeks = []; 
          const DISPLAY_WEEKS = 5;
          for(let i = DISPLAY_WEEKS - 1; i >= 0; i--) {
            const now = new Date();
            const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
            const targetWeekIndex = offset * DISPLAY_WEEKS + i;

            const endOfWeek = new Date(now); 
            endOfWeek.setDate(now.getDate() - dayOfWeek + 6 - (targetWeekIndex * 7));
            const startOfWeek = new Date(endOfWeek); 
            startOfWeek.setDate(endOfWeek.getDate() - 6);

            const startStr = getLocalDateString(startOfWeek); 
            const endStr = getLocalDateString(endOfWeek);
            const weekRecords = records.filter(r => { const rDate = getLocalDateString(r.date); return rDate >= startStr && rDate <= endStr; });
            let total = 0; const subjects = {}; SUBJECTS.forEach(s => subjects[s] = 0);
            weekRecords.forEach(r => {
              const mat = materials.find(m => m.id === r.materialId);
              const sub = mat ? mat.subject : 'その他';
              if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;
              total += r.durationSeconds;
            });
            
            let label = '';
            if (targetWeekIndex === 0) label = '今週';
            else if (targetWeekIndex === 1) label = '先週';
            else label = `${startOfWeek.getMonth()+1}/${startOfWeek.getDate()}~`;

            weeks.push({ label, total, subjects });
          }
          return weeks;
        }
      }, [records, materials, view, offset]);

      const maxTotalSec = Math.max(...chartData.map(d => d.total), 3600);
      const maxHours = Math.max(Math.ceil(maxTotalSec / 3600), 3);
      const step = Math.ceil(maxHours / 4) || 1;
      const topHour = Math.ceil(maxHours / step) * step;
      
      const yAxisLabels = [];
      for (let i = topHour; i >= 0; i -= step) { yAxisLabels.push(i); }
      const adjustedMaxVal = topHour * 3600;

      const handlePrev = () => setOffset(o => o + 1);
      const handleNext = () => setOffset(o => Math.max(0, o - 1));

      return (
        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100 animate-in fade-in mt-6">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold text-slate-800">学習時間の推移</h3>
            <div className="flex bg-slate-100 rounded-lg p-1">
              <button onClick={()=>setView('daily')} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${view==='daily'?'bg-white shadow-sm text-indigo-600':'text-slate-500'}`}>日別</button>
              <button onClick={()=>setView('weekly')} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${view==='weekly'?'bg-white shadow-sm text-indigo-600':'text-slate-500'}`}>週別</button>
            </div>
          </div>

          <div className="flex justify-between items-center mb-6 bg-slate-50/50 p-2 rounded-xl border border-slate-100">
            <button onClick={handlePrev} className="p-2 hover:bg-slate-200 rounded-lg transition-colors flex items-center gap-1 text-slate-600 text-sm font-bold">
              <Icon name="chevron-left" size={18} /> <span className="hidden sm:inline">先週</span>
            </button>
            <span className="text-sm font-bold text-slate-600 tracking-wide">
              {view === 'daily' 
                ? `${chartData[0].label.split('(')[0]} 〜 ${chartData[chartData.length-1].label.split('(')[0]}`
                : `${offset === 0 ? '直近5週間' : `${chartData[0].label} 〜 ${chartData[chartData.length-1].label}`}`
              }
            </span>
            <button onClick={handleNext} disabled={offset === 0} className={`p-2 rounded-lg transition-colors flex items-center gap-1 text-sm font-bold ${offset === 0 ? 'text-slate-300' : 'text-slate-600 hover:bg-slate-200'}`}>
              <span className="hidden sm:inline">翌週</span> <Icon name="chevron-right" size={18} />
            </button>
          </div>
          
          <div className="flex h-72 sm:h-80">
            <div className="w-8 md:w-10 flex flex-col justify-between text-[10px] text-slate-400 font-bold pb-8 pt-12 border-r border-slate-200">
              {yAxisLabels.map(h => (
                <div key={h} className="text-right pr-2 transform translate-y-1.5">{h}h</div>
              ))}
            </div>
            
            <div className="flex-1 relative">
              <div className="absolute inset-0 flex flex-col justify-between pointer-events-none pb-8 pt-12">
                {yAxisLabels.map((h, i) => (
                  <div key={h} className={`border-t w-full ${i === yAxisLabels.length - 1 ? 'border-transparent' : 'border-slate-100 border-dashed'}`}></div>
                ))}
              </div>

              <div className="h-full w-full flex items-end pb-8 pt-12 relative z-10 justify-around px-2 sm:px-6">
                {chartData.map((d, i) => {
                  const heightPercent = adjustedMaxVal > 0 ? (d.total / adjustedMaxVal) * 100 : 0;
                  return (
                    <div key={i} className="flex flex-col items-center justify-end h-full w-10 sm:w-12 group relative">
                      <div className="absolute bottom-full mb-2 bg-slate-800 text-white text-xs p-2.5 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50">
                        <p className="font-bold text-center border-b border-slate-600 pb-1.5 mb-1.5">{d.label} : {(d.total/3600).toFixed(1)}h</p>
                        {SUBJECTS.map(sub => d.subjects[sub] > 0 && (
                          <div key={sub} className="flex items-center gap-1.5 mb-1 last:mb-0">
                            <span className="w-2 h-2 rounded-full" style={{backgroundColor: SUBJECT_COLORS[sub]}}></span>
                            <span className="font-medium text-[10px]">{sub}: {(d.subjects[sub]/3600).toFixed(1)}h</span>
                          </div>
                        ))}
                      </div>

                      <div className="w-full flex flex-col-reverse rounded-t-md overflow-hidden min-h-[4px] shadow-sm cursor-pointer hover:brightness-110 transition-all duration-700 ease-out bg-slate-50" style={{ height: `${heightPercent}%` }}>
                        {SUBJECTS.map(sub => {
                          const h = d.total > 0 ? (d.subjects[sub] / d.total) * 100 : 0;
                          if (h === 0) return null;
                          return <div key={sub} style={{ height: `${h}%`, backgroundColor: SUBJECT_COLORS[sub] }} className="w-full transition-all border-b border-black/5 last:border-0"></div>
                        })}
                      </div>

                      <span className="absolute -bottom-6 text-[9px] sm:text-[10px] text-slate-500 font-bold whitespace-nowrap">{d.label}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="flex flex-wrap gap-4 mt-8 justify-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
            {SUBJECTS.map(sub => (
              <div key={sub} className="flex items-center gap-1.5">
                <span className="w-3.5 h-3.5 rounded-full shadow-sm" style={{backgroundColor: SUBJECT_COLORS[sub]}}></span>
                <span className="text-xs font-bold text-slate-700">{sub}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- 1. ダッシュボード ---
    function Dashboard({ records, materials, goal, setTab, userProfile }) {
      const today = getLocalDateString(new Date());
      const stats = useMemo(() => {
        let todaySec = 0, weekSec = 0, totalSec = 0;
        const now = new Date();
        const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
        const monday = new Date(now); monday.setDate(now.getDate() - dayOfWeek);
        const mondayStr = getLocalDateString(monday);

        records.forEach(r => {
          totalSec += r.durationSeconds;
          const rDate = getLocalDateString(r.date);
          if (rDate === today) todaySec += r.durationSeconds;
          if (rDate >= mondayStr) weekSec += r.durationSeconds;
        });
        return { todaySec, weekSec, totalSec };
      }, [records, materials, today]);

      const formatH = (s) => (s / 3600).toFixed(1);
      const weekProgress = Math.min((stats.weekSec / 3600) / goal * 100, 100);

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="flex items-center justify-between mb-2">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">ダッシュボード</h2>
              {userProfile.name && <p className="text-sm text-slate-500 font-bold mt-1">ようこそ、{userProfile.name} さん</p>}
            </div>
            <button onClick={() => setTab('record')} className="bg-indigo-600 text-white px-5 py-2.5 rounded-full font-bold shadow-md hover:bg-indigo-700 flex items-center gap-2 text-sm transition-transform active:scale-95">
              <Icon name="plus-circle" size={18} /> 記録をつける
            </button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3 mb-2"><div className="bg-orange-100 p-2 rounded-xl text-orange-600"><Icon name="sun" size={20} /></div><p className="text-sm font-bold text-slate-500">今日</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.todaySec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3 mb-2"><div className="bg-blue-100 p-2 rounded-xl text-blue-600"><Icon name="calendar-days" size={20} /></div><p className="text-sm font-bold text-slate-500">今週</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.weekSec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 col-span-2 md:col-span-1">
              <div className="flex items-center gap-3 mb-2"><div className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><Icon name="award" size={20} /></div><p className="text-sm font-bold text-slate-500">累計</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.totalSec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div className="flex justify-between items-end mb-4">
              <h3 className="font-bold text-slate-800">今週の目標達成率</h3>
              <span className="text-sm text-slate-500 font-bold">{formatH(stats.weekSec)} / {goal} 時間</span>
            </div>
            <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden">
              <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000 ease-out relative" style={{ width: `${weekProgress}%` }}>
                <div className="absolute inset-0 bg-white/20 w-full h-full" style={{ backgroundImage: 'linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent)', backgroundSize: '1rem 1rem' }}></div>
              </div>
            </div>
          </div>

          <StudyChart records={records} materials={materials} />
        </div>
      );
    }

    // --- 2. 記録・タイマー ---
    function Record({ materials, addRecord }) {
      const [mode, setMode] = useState('timer');
      const [time, setTime] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const [selectedMaterialId, setSelectedMaterialId] = useState('');
      const intervalRef = useRef(null);

      const [manualDate, setManualDate] = useState(getLocalDateString(new Date()));
      const [manualMaterialId, setManualMaterialId] = useState('');
      const [manualHours, setManualHours] = useState('');
      const [manualMinutes, setManualMinutes] = useState('');

      useEffect(() => {
        if (isRunning) { intervalRef.current = setInterval(() => setTime(t => t + 1), 1000); } 
        else { clearInterval(intervalRef.current); }
        return () => clearInterval(intervalRef.current);
      }, [isRunning]);

      const toggleTimer = () => {
        if (!selectedMaterialId) return alert("学習する教材を選択してください");
        setIsRunning(!isRunning);
      };

      const stopTimer = () => {
        setIsRunning(false);
        if (time > 60) {
          addRecord(selectedMaterialId, time);
          alert("記録を保存しました！");
        } else if (time > 0) {
          alert("1分未満のため記録されませんでした");
        }
        setTime(0);
      };

      const handleManualSubmit = (e) => {
        e.preventDefault();
        if (!manualMaterialId) return alert('教材を選択してください');
        const h = parseInt(manualHours || 0); const m = parseInt(manualMinutes || 0);
        const totalSec = (h * 3600) + (m * 60);
        if (totalSec <= 0) return alert('学習時間を入力してください');
        
        addRecord(manualMaterialId, totalSec, manualDate);
        alert('手動で記録を追加しました！');
        setManualHours(''); setManualMinutes('');
      };

      const formatTime = (sec) => {
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      return (
        <div className="max-w-md mx-auto mt-4 animate-in slide-in-from-bottom-4 duration-500">
          <div className="flex bg-slate-200 p-1.5 rounded-2xl mb-8 shadow-inner">
            <button onClick={()=>setMode('timer')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='timer' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>タイマーで計る</button>
            <button onClick={()=>setMode('manual')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='manual' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>手動で入力</button>
          </div>

          {mode === 'timer' ? (
            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 text-center relative overflow-hidden">
              <div className={`absolute inset-0 bg-indigo-500 opacity-5 transition-opacity ${isRunning ? 'animate-pulse' : 'hidden'}`}></div>
              <h2 className="text-xl font-bold text-slate-800 mb-8 relative z-10 flex items-center justify-center gap-2">
                <Icon name="timer" size={20} className="text-indigo-500" /> 学習タイマー
              </h2>
              <select 
                value={selectedMaterialId} onChange={(e) => setSelectedMaterialId(e.target.value)} disabled={isRunning}
                className="w-full p-4 mb-8 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none transition-all disabled:opacity-50 relative z-10"
              >
                <option value="">教材を選択...</option>
                {materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}
              </select>
              <div className="text-6xl md:text-7xl font-black text-slate-800 tracking-wider font-mono my-12 relative z-10 drop-shadow-sm">{formatTime(time)}</div>
              <div className="flex justify-center gap-6 relative z-10">
                <button onClick={toggleTimer} className={`w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg transition-transform hover:scale-105 active:scale-95 ${isRunning ? 'bg-amber-500' : 'bg-indigo-600'}`}>
                  <Icon name={isRunning ? "pause" : "play"} size={36} className={isRunning ? "" : "ml-2"} />
                </button>
                <button onClick={stopTimer} disabled={time === 0} className="w-20 h-20 rounded-full flex items-center justify-center bg-slate-800 text-white shadow-lg hover:bg-slate-900 transition-transform hover:scale-105 active:scale-95 disabled:opacity-30 disabled:hover:scale-100">
                  <Icon name="square" size={28} />
                </button>
              </div>
            </div>
          ) : (
            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 relative overflow-hidden">
              <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <Icon name="pen-tool" size={20} className="text-indigo-500" /> 手動で記録
              </h2>
              <form onSubmit={handleManualSubmit} className="space-y-5">
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">日付</label>
                  <input type="date" value={manualDate} onChange={e=>setManualDate(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">教材</label>
                  <select value={manualMaterialId} onChange={e=>setManualMaterialId(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required>
                    <option value="">選択してください...</option>
                    {materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}
                  </select>
                </div>
                <div className="flex gap-4">
                  <div className="flex-1">
                    <label className="block text-sm font-bold text-slate-600 mb-2">時間</label>
                    <div className="flex items-center gap-2 bg-slate-50 border-2 border-slate-100 rounded-2xl px-4">
                      <input type="number" min="0" value={manualHours} onChange={e=>setManualHours(e.target.value)} className="w-full py-4 bg-transparent text-center font-bold text-xl outline-none" placeholder="0" />
                      <span className="font-bold text-slate-400">h</span>
                    </div>
                  </div>
                  <div className="flex-1">
                    <label className="block text-sm font-bold text-slate-600 mb-2">分</label>
                    <div className="flex items-center gap-2 bg-slate-50 border-2 border-slate-100 rounded-2xl px-4">
                      <input type="number" min="0" max="59" value={manualMinutes} onChange={e=>setManualMinutes(e.target.value)} className="w-full py-4 bg-transparent text-center font-bold text-xl outline-none" placeholder="0" />
                      <span className="font-bold text-slate-400">m</span>
                    </div>
                  </div>
                </div>
                <button type="submit" className="w-full mt-4 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-transform active:scale-95 flex items-center justify-center gap-2">
                  <Icon name="check-circle" size={20} /> 記録を保存する
                </button>
              </form>
            </div>
          )}
        </div>
      );
    }

    // --- 3. カレンダー ---
    function Calendar({ records, materials, events, setEvents }) {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [newEventTitle, setNewEventTitle] = useState('');
      const [newEventDesc, setNewEventDesc] = useState('');
      const [newEventDate, setNewEventDate] = useState(getLocalDateString(new Date()));
      const [newEventColor, setNewEventColor] = useState(EVENT_COLORS[0].color);
      const [selectedEvent, setSelectedEvent] = useState(null);
      
      const timerRef = useRef(null);

      const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
      const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();

      useEffect(() => {
        if (isModalOpen || selectedEvent) document.body.classList.add('modal-open');
        else document.body.classList.remove('modal-open');
        return () => document.body.classList.remove('modal-open');
      }, [isModalOpen, selectedEvent]);

      const openEventModal = (dateStr) => {
        setNewEventDate(dateStr || getLocalDateString(new Date())); setNewEventTitle(''); setNewEventDesc(''); setNewEventColor(EVENT_COLORS[0].color); setIsModalOpen(true);
      };
      const closeEventModal = () => setIsModalOpen(false);

      const addEvent = (e) => {
        e.preventDefault();
        if(!newEventTitle) return;
        setEvents([...events, { id: Date.now().toString(), title: newEventTitle, description: newEventDesc, date: newEventDate, color: newEventColor }]);
        closeEventModal();
      };
      const deleteEvent = (id) => { if(confirm('この予定を削除しますか？')) { setEvents(events.filter(ev => ev.id !== id)); setSelectedEvent(null); } };
      
      const handlePointerDown = (e, dateStr) => {
        if (e.type === 'mousedown' && e.button !== 0) return;
        timerRef.current = setTimeout(() => {
          openEventModal(dateStr);
        }, 500); // 500ms長押しでモーダルを開く
      };
      const handlePointerUp = () => {
        if (timerRef.current) clearTimeout(timerRef.current);
      };

      const changeMonth = (offset) => {
        const d = new Date(currentDate);
        d.setMonth(d.getMonth() + offset);
        setCurrentDate(d);
      };

      const handleDayClick = (dateStr) => {
        const dayEvents = events.filter(ev => ev.date === dateStr);
        const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);
        if (dayEvents.length > 0 || dayRecords.length > 0) {
          setSelectedEvent({ dateStr, events: dayEvents, records: dayRecords });
        } else {
          openEventModal(dateStr);
        }
      };

      const renderDays = () => {
        const days = [];
        const todayStr = getLocalDateString(new Date());

        for (let i = 0; i < firstDayOfMonth; i++) {
          days.push(<div key={`empty-${i}`} className="p-2 border border-transparent"></div>);
        }

        for (let i = 1; i <= daysInMonth; i++) {
          const d = new Date(currentDate.getFullYear(), currentDate.getMonth(), i);
          const dateStr = getLocalDateString(d);
          const dayEvents = events.filter(ev => ev.date === dateStr);
          const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);
          const isToday = dateStr === todayStr;
          
          let totalSec = 0;
          dayRecords.forEach(r => totalSec += r.durationSeconds);
          const totalHours = (totalSec / 3600).toFixed(1);

          days.push(
            <div 
              key={i} 
              onPointerDown={(e) => handlePointerDown(e, dateStr)}
              onPointerUp={handlePointerUp}
              onPointerLeave={handlePointerUp}
              onClick={() => handleDayClick(dateStr)}
              className={`min-h-[80px] md:min-h-[100px] p-1 md:p-2 border border-slate-100 bg-white rounded-xl shadow-sm cursor-pointer hover:bg-indigo-50 transition-colors relative no-callout group ${isToday ? 'ring-2 ring-indigo-500 bg-indigo-50/30' : ''}`}
            >
              <div className="flex justify-between items-start mb-1">
                <span className={`text-xs md:text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${isToday ? 'bg-indigo-600 text-white' : 'text-slate-600'}`}>
                  {i}
                </span>
                {totalSec > 0 && <span className="text-[10px] text-slate-500 font-bold">{totalHours}h</span>}
              </div>
              
              <div className="space-y-1 overflow-hidden max-h-[40px] md:max-h-[60px]">
                {dayEvents.slice(0, 3).map(ev => (
                  <div key={ev.id} className="text-[9px] md:text-xs text-white px-1.5 py-0.5 rounded truncate shadow-sm" style={{ backgroundColor: ev.color }}>
                    {ev.title}
                  </div>
                ))}
                {dayEvents.length > 3 && <div className="text-[10px] text-slate-400 font-bold pl-1">+{dayEvents.length - 3}</div>}
              </div>
            </div>
          );
        }
        return days;
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
              <Icon name="calendar" className="text-indigo-600" /> カレンダー
            </h2>
            <div className="flex items-center gap-4">
              <button onClick={() => changeMonth(-1)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="chevron-left" /></button>
              <span className="font-bold text-lg w-28 text-center">{currentDate.getFullYear()}年 {currentDate.getMonth() + 1}月</span>
              <button onClick={() => changeMonth(1)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="chevron-right" /></button>
            </div>
          </div>

          <div className="bg-white p-2 md:p-4 rounded-3xl shadow-sm border border-slate-100">
            <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
              {['日', '月', '火', '水', '木', '金', '土'].map((day, i) => (
                <div key={day} className={`text-center text-xs md:text-sm font-bold py-2 ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-slate-500'}`}>{day}</div>
              ))}
            </div>
            <div className="grid grid-cols-7 gap-1 md:gap-2">
              {renderDays()}
            </div>
            <p className="text-xs text-slate-400 mt-4 text-center">※ 日付を長押し(PCは長押し)で予定を追加できます</p>
          </div>

          {/* 予定追加モーダル */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-in fade-in">
              <div className="bg-white rounded-[2rem] p-6 md:p-8 w-full max-w-md shadow-2xl relative">
                <button onClick={closeEventModal} className="absolute top-6 right-6 text-slate-400 hover:text-slate-600"><Icon name="x" /></button>
                <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Icon name="calendar-plus" className="text-indigo-500" /> 予定の追加</h3>
                <form onSubmit={addEvent} className="space-y-5">
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-2">日付</label>
                    <input type="date" value={newEventDate} onChange={e=>setNewEventDate(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-2">タイトル</label>
                    <input type="text" value={newEventTitle} onChange={e=>setNewEventTitle(e.target.value)} placeholder="模試、テストなど" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-2">カラー</label>
                    <div className="flex flex-wrap gap-2">
                      {EVENT_COLORS.map(c => (
                        <button key={c.id} type="button" onClick={()=>setNewEventColor(c.color)} className={`w-8 h-8 rounded-full transition-transform ${newEventColor === c.color ? 'scale-125 ring-2 ring-offset-2 ring-slate-400 shadow-md' : 'hover:scale-110'}`} style={{backgroundColor: c.color}} title={c.label}></button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-2">メモ (任意)</label>
                    <textarea value={newEventDesc} onChange={e=>setNewEventDesc(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none min-h-[100px]" placeholder="詳細を記入..." />
                  </div>
                  <button type="submit" className="w-full mt-4 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-transform">追加する</button>
                </form>
              </div>
            </div>
          )}

          {/* 日付詳細モーダル */}
          {selectedEvent && (
             <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-in fade-in">
             <div className="bg-white rounded-[2rem] p-6 md:p-8 w-full max-w-md shadow-2xl relative max-h-[80vh] overflow-y-auto">
               <button onClick={() => setSelectedEvent(null)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-600"><Icon name="x" /></button>
               <h3 className="text-xl font-bold text-slate-800 mb-6 border-b pb-4">{selectedEvent.dateStr} の詳細</h3>
               
               <div className="space-y-6">
                 <div>
                   <h4 className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-1"><Icon name="calendar" size={16} /> 予定</h4>
                   {selectedEvent.events.length === 0 ? (
                     <p className="text-slate-400 text-sm">予定はありません</p>
                   ) : (
                     <div className="space-y-2">
                       {selectedEvent.events.map(ev => (
                         <div key={ev.id} className="p-3 rounded-xl border border-slate-100 flex justify-between items-center group" style={{ borderLeftColor: ev.color, borderLeftWidth: '4px' }}>
                           <div>
                             <p className="font-bold text-slate-700">{ev.title}</p>
                             {ev.description && <p className="text-xs text-slate-500 mt-1">{ev.description}</p>}
                           </div>
                           <button onClick={() => deleteEvent(ev.id)} className="text-slate-300 hover:text-red-500 transition-colors p-2"><Icon name="trash-2" size={18} /></button>
                         </div>
                       ))}
                     </div>
                   )}
                   <button onClick={() => { setSelectedEvent(null); openEventModal(selectedEvent.dateStr); }} className="mt-3 text-indigo-600 text-sm font-bold hover:underline flex items-center gap-1">
                     <Icon name="plus" size={16} /> 予定を追加
                   </button>
                 </div>

                 <div>
                   <h4 className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-1"><Icon name="clock" size={16} /> 学習記録</h4>
                   {selectedEvent.records.length === 0 ? (
                     <p className="text-slate-400 text-sm">学習記録はありません</p>
                   ) : (
                     <div className="space-y-2">
                       {selectedEvent.records.map(r => {
                         const mat = materials.find(m => m.id === r.materialId);
                         return (
                           <div key={r.id} className="bg-slate-50 p-3 rounded-xl flex justify-between items-center border border-slate-100">
                             <div className="flex items-center gap-2">
                               <span className="w-3 h-3 rounded-full shadow-sm" style={{backgroundColor: SUBJECT_COLORS[mat ? mat.subject : 'その他']}}></span>
                               <span className="font-bold text-slate-700 text-sm">{mat ? mat.name : '不明な教材'}</span>
                             </div>
                             <span className="font-bold text-indigo-600">{(r.durationSeconds / 3600).toFixed(1)}h</span>
                           </div>
                         )
                       })}
                     </div>
                   )}
                 </div>
               </div>
             </div>
           </div>
          )}
        </div>
      );
    }

    // --- 4. 教材管理 ---
    function MaterialsManager({ materials, setMaterials }) {
      const [newMaterialName, setNewMaterialName] = useState('');
      const [newMaterialSubject, setNewMaterialSubject] = useState(SUBJECTS[0]);

      const addMaterial = (e) => {
        e.preventDefault();
        if(!newMaterialName) return;
        setMaterials([...materials, { id: Date.now().toString(), name: newMaterialName, subject: newMaterialSubject }]);
        setNewMaterialName('');
      };

      const deleteMaterial = (id) => {
        if(confirm('この教材を削除しますか？\n(過去の記録は残ります)')) {
          setMaterials(materials.filter(m => m.id !== id));
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-6">
            <Icon name="library" className="text-indigo-600" /> 教材管理
          </h2>

          <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><Icon name="plus-circle" size={18} className="text-indigo-500" /> 新しい教材を登録</h3>
            <form onSubmit={addMaterial} className="flex flex-col md:flex-row gap-4">
              <select value={newMaterialSubject} onChange={e=>setNewMaterialSubject(e.target.value)} className="p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none md:w-48 focus:border-indigo-300">
                {SUBJECTS.map(sub => <option key={sub} value={sub}>{sub}</option>)}
              </select>
              <input type="text" value={newMaterialName} onChange={e=>setNewMaterialName(e.target.value)} placeholder="チャート式 数学I+A など" className="flex-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none focus:border-indigo-300" required />
              <button type="submit" className="bg-indigo-600 text-white font-bold py-4 px-8 rounded-2xl shadow-md hover:bg-indigo-700 transition-transform active:scale-95 whitespace-nowrap">追加</button>
            </form>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {materials.map(mat => (
              <div key={mat.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center group">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-sm" style={{backgroundColor: SUBJECT_COLORS[mat.subject]}}>
                    {mat.subject.slice(0,1)}
                  </div>
                  <div>
                    <p className="font-bold text-slate-800">{mat.name}</p>
                    <p className="text-xs text-slate-500">{mat.subject}</p>
                  </div>
                </div>
                <button onClick={() => deleteMaterial(mat.id)} className="text-slate-300 hover:text-red-500 p-2 transition-colors"><Icon name="trash-2" size={20} /></button>
              </div>
            ))}
            {materials.length === 0 && (
              <div className="col-span-1 md:col-span-2 text-center py-12 text-slate-400 font-bold bg-slate-50 rounded-3xl border border-slate-100 border-dashed">
                まだ教材が登録されていません。<br/>上のフォームから追加してください。
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- 5. 設定・提出・データバックアップ ---
    function Settings({ records, setRecords, materials, setMaterials, events, setEvents, goal, setGoal, formSettings, setFormSettings, userProfile, setUserProfile }) {
      
      const handleProfileChange = (e) => { const { name, value } = e.target; setUserProfile(prev => ({ ...prev, [name]: value })); };
      
      const handleFormSettingChange = (e) => {
        const { name, value } = e.target;
        setFormSettings(prev => ({ ...prev, [name]: value }));
      };
      const handleFormSubjectChange = (sub, value) => {
        setFormSettings(prev => ({ ...prev, entryIdsSubjects: { ...prev.entryIdsSubjects, [sub]: value } }));
      };
      const handleFormProfileChange = (key, value) => {
        setFormSettings(prev => ({ ...prev, entryIdsProfile: { ...prev.entryIdsProfile, [key]: value } }));
      };

      const generateFormUrl = () => {
        const { baseUrl, entryIdTotal, entryIdsSubjects, entryIdsProfile } = formSettings;
        if (!baseUrl) return '';

        let url = baseUrl;
        if (!url.includes('?')) url += '?usp=pp_url';
        else url += '&usp=pp_url';

        if (entryIdsProfile.grade && userProfile.grade) url += `&entry.${entryIdsProfile.grade}=${encodeURIComponent(userProfile.grade)}`;
        if (entryIdsProfile.classNum && userProfile.classNum) url += `&entry.${entryIdsProfile.classNum}=${encodeURIComponent(userProfile.classNum)}`;
        if (entryIdsProfile.studentNum && userProfile.studentNum) url += `&entry.${entryIdsProfile.studentNum}=${encodeURIComponent(userProfile.studentNum)}`;
        if (entryIdsProfile.name && userProfile.name) url += `&entry.${entryIdsProfile.name}=${encodeURIComponent(userProfile.name)}`;

        // 今週の学習時間を計算
        const now = new Date();
        const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
        const monday = new Date(now); monday.setDate(now.getDate() - dayOfWeek);
        const mondayStr = getLocalDateString(monday);
        
        let weekTotalSec = 0;
        const weekSubjectsSec = {};
        SUBJECTS.forEach(s => weekSubjectsSec[s] = 0);

        records.forEach(r => {
          const rDate = getLocalDateString(r.date);
          if (rDate >= mondayStr) {
            weekTotalSec += r.durationSeconds;
            const mat = materials.find(m => m.id === r.materialId);
            const sub = mat ? mat.subject : 'その他';
            if(weekSubjectsSec[sub] !== undefined) weekSubjectsSec[sub] += r.durationSeconds;
          }
        });

        if (entryIdTotal) url += `&entry.${entryIdTotal}=${(weekTotalSec / 3600).toFixed(1)}`;
        SUBJECTS.forEach(sub => {
          if (entryIdsSubjects[sub]) {
            url += `&entry.${entryIdsSubjects[sub]}=${(weekSubjectsSec[sub] / 3600).toFixed(1)}`;
          }
        });

        return url;
      };

      const handleSubmitForm = () => {
        const url = generateFormUrl();
        if (!url) return alert('フォームURLが設定されていません。\n下の「Google Form連携設定」で設定してください。');
        window.open(url, '_blank');
      };

      // データのエクスポート（バックアップ）
      const exportData = () => {
        const data = { materials, records, events, goal, userProfile, formSettings };
        const jsonStr = JSON.stringify(data);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `StudyLog_Backup_${getLocalDateString(new Date())}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // データのインポート（復元）
      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.materials) setMaterials(data.materials);
            if (data.records) setRecords(data.records);
            if (data.events) setEvents(data.events);
            if (data.goal) setGoal(data.goal);
            if (data.userProfile) setUserProfile(data.userProfile);
            if (data.formSettings) setFormSettings(data.formSettings);
            alert('データの復元が完了しました！');
          } catch (err) {
            alert('ファイルの読み込みに失敗しました。正しいバックアップファイルを選択してください。');
          }
        };
        reader.readAsText(file);
        e.target.value = ''; // Reset input
      };

      return (
        <div className="space-y-8 animate-in fade-in duration-500 pb-10">
          <div className="flex justify-between items-center">
            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
              <Icon name="settings" className="text-indigo-600" /> 設定・提出
            </h2>
            <button onClick={handleSubmitForm} className="bg-emerald-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-emerald-600 transition-transform active:scale-95 flex items-center gap-2">
              <Icon name="send" size={18} /> 今週の記録を提出
            </button>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 className="text-lg font-bold text-slate-700 mb-6 flex items-center gap-2 border-b pb-4"><Icon name="user" className="text-indigo-500" /> プロフィール・目標設定</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div><label className="block text-sm font-bold text-slate-600 mb-2">学年</label><input type="text" name="grade" value={userProfile.grade} onChange={handleProfileChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="例: 1年" /></div>
              <div><label className="block text-sm font-bold text-slate-600 mb-2">組</label><input type="text" name="classNum" value={userProfile.classNum} onChange={handleProfileChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="例: A組" /></div>
              <div><label className="block text-sm font-bold text-slate-600 mb-2">出席番号</label><input type="text" name="studentNum" value={userProfile.studentNum} onChange={handleProfileChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="例: 12" /></div>
              <div><label className="block text-sm font-bold text-slate-600 mb-2">氏名</label><input type="text" name="name" value={userProfile.name} onChange={handleProfileChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="例: 山田 太郎" /></div>
              <div className="md:col-span-2">
                <label className="block text-sm font-bold text-slate-600 mb-2">1週間の目標学習時間 (時間)</label>
                <div className="flex items-center gap-4">
                  <input type="number" min="1" value={goal} onChange={e=>setGoal(parseInt(e.target.value) || 0)} className="w-32 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-xl text-center outline-none" />
                  <span className="font-bold text-slate-500">時間 / 週</span>
                </div>
              </div>
            </div>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 className="text-lg font-bold text-slate-700 mb-2 flex items-center gap-2"><Icon name="link" className="text-indigo-500" /> Google Form連携設定</h3>
            <p className="text-sm text-slate-500 mb-6 border-b pb-4">フォームの「事前入力したURLを取得」から取得した各項目の entry.ID を設定してください。</p>
            
            <div className="space-y-6">
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-2">フォーム基本URL</label>
                <input type="text" name="baseUrl" value={formSettings.baseUrl} onChange={handleFormSettingChange} placeholder="https://docs.google.com/forms/d/e/.../viewform" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm outline-none" />
              </div>
              
              <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <h4 className="font-bold text-slate-600 mb-4">プロフィールの entry.ID</h4>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <div><label className="text-xs font-bold text-slate-500 block mb-1">学年</label><input type="text" value={formSettings.entryIdsProfile.grade} onChange={e=>handleFormProfileChange('grade', e.target.value)} placeholder="entry.123..." className="w-full p-2 border rounded-lg text-sm" /></div>
                  <div><label className="text-xs font-bold text-slate-500 block mb-1">組</label><input type="text" value={formSettings.entryIdsProfile.classNum} onChange={e=>handleFormProfileChange('classNum', e.target.value)} placeholder="entry.123..." className="w-full p-2 border rounded-lg text-sm" /></div>
                  <div><label className="text-xs font-bold text-slate-500 block mb-1">出席番号</label><input type="text" value={formSettings.entryIdsProfile.studentNum} onChange={e=>handleFormProfileChange('studentNum', e.target.value)} placeholder="entry.123..." className="w-full p-2 border rounded-lg text-sm" /></div>
                  <div><label className="text-xs font-bold text-slate-500 block mb-1">氏名</label><input type="text" value={formSettings.entryIdsProfile.name} onChange={e=>handleFormProfileChange('name', e.target.value)} placeholder="entry.123..." className="w-full p-2 border rounded-lg text-sm" /></div>
                </div>
              </div>

              <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <h4 className="font-bold text-slate-600 mb-4">学習時間の entry.ID (今週の合計が自動入力されます)</h4>
                <div className="mb-4">
                  <label className="text-sm font-bold text-indigo-600 block mb-1">全教科の合計時間</label>
                  <input type="text" name="entryIdTotal" value={formSettings.entryIdTotal} onChange={handleFormSettingChange} placeholder="entry.123..." className="w-full md:w-1/2 p-3 border rounded-xl text-sm border-indigo-200" />
                </div>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 border-t border-slate-200 pt-4">
                  {SUBJECTS.map(sub => (
                    <div key={sub}>
                      <label className="text-xs font-bold text-slate-500 block mb-1">{sub} の合計時間</label>
                      <input type="text" value={formSettings.entryIdsSubjects[sub]} onChange={e=>handleFormSubjectChange(sub, e.target.value)} placeholder="entry.123..." className="w-full p-2 border rounded-lg text-sm" />
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* 追加：データバックアップ・復元機能 */}
          <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 className="text-lg font-bold text-slate-700 mb-2 flex items-center gap-2"><Icon name="database" className="text-indigo-500" /> データ引き継ぎ（バックアップ／復元）</h3>
            <p className="text-sm text-slate-500 mb-6 border-b pb-4">
              アプリをアップデート（HTMLを新しく）する際や、別のブラウザにデータを移す際に使用します。<br/>
              ※アップデート前に必ず「バックアップをダウンロード」してください。
            </p>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 text-center">
                <Icon name="download-cloud" size={32} className="mx-auto text-indigo-500 mb-3" />
                <h4 className="font-bold text-slate-700 mb-2">データの保存</h4>
                <p className="text-xs text-slate-500 mb-4">現在のすべての学習記録や設定をファイルとして保存します。</p>
                <button onClick={exportData} className="bg-indigo-600 text-white w-full py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">
                  バックアップをダウンロード
                </button>
              </div>

              <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 text-center">
                <Icon name="upload-cloud" size={32} className="mx-auto text-amber-500 mb-3" />
                <h4 className="font-bold text-slate-700 mb-2">データの復元</h4>
                <p className="text-xs text-slate-500 mb-4">保存したバックアップファイルを読み込んで復元します。</p>
                <label className="bg-amber-500 text-white w-full py-3 rounded-xl font-bold hover:bg-amber-600 transition-colors cursor-pointer inline-block">
                  ファイルを選択して復元
                  <input type="file" accept=".json" onChange={importData} className="hidden" />
                </label>
              </div>
            </div>
          </div>
          
        </div>
      );
    }

    // Reactレンダリング
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
