<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Study Log</title>
  
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Study%20Log%22%2C%22short_name%22%3A%22Study%20Log%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%234f46e5%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%2C%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Study Log">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f8fafc; }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    /* iOSでの長押し時の選択メニュー防止 */
    .no-callout { -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; }
    /* スピナー用 */
    .loader {
        border-top-color: #4f46e5;
        -webkit-animation: spinner 1.5s linear infinite;
        animation: spinner 1.5s linear infinite;
    }
    @keyframes spinner {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 定数設定 ---
    const SUBJECT_COLORS = {
      '英語': '#ec4899', '数学': '#3b82f6', '理科': '#22c55e', 
      '社会': '#f97316', '国語': '#a855f7', 'その他': '#9ca3af',
    };
    const SUBJECTS = Object.keys(SUBJECT_COLORS);

    const EVENT_COLORS = [
      { id: 'red', color: '#ef4444', label: '赤' },
      { id: 'pink', color: '#ec4899', label: 'ピンク' },
      { id: 'blue', color: '#3b82f6', label: '青' },
      { id: 'cyan', color: '#0ea5e9', label: '水色' },
      { id: 'green', color: '#22c55e', label: '緑' },
      { id: 'lime', color: '#84cc16', label: '黄緑' },
      { id: 'orange', color: '#f97316', label: 'オレンジ' },
      { id: 'yellow', color: '#eab308', label: '黄色' },
      { id: 'purple', color: '#9333ea', label: '紫' },
      { id: 'lightpurple', color: '#d8b4fe', label: '薄紫' },
      { id: 'gray', color: '#64748b', label: 'グレー' },
      { id: 'black', color: '#0f172a', label: '黒' },
    ];
    
    const STORAGE_PREFIX = 'study_tracker_v4_';
    
    const getLocalDateString = (date) => {
      const d = new Date(date);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    };

    // --- アイコンコンポーネント ---
    const Icon = ({ name, size = 24, className = '', ...props }) => {
      useEffect(() => { lucide.createIcons(); });
      return <i data-lucide={name} style={{ width: size, height: size }} className={className} {...props}></i>;
    };

    // --- メインアプリ ---
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [materials, setMaterials] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'materials')) || []);
      const [records, setRecords] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'records')) || []);
      const [events, setEvents] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'events')) || []);
      const [weeklyGoalHours, setWeeklyGoalHours] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'goal')) || 20);

      // プロフィール用のState追加
      const defaultUserProfile = { grade: '', classNum: '', studentNum: '', name: '' };
      const [userProfile, setUserProfile] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'userProfile')) || defaultUserProfile);

      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'materials', JSON.stringify(materials)); }, [materials]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'records', JSON.stringify(records)); }, [records]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'events', JSON.stringify(events)); }, [events]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'goal', JSON.stringify(weeklyGoalHours)); }, [weeklyGoalHours]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'userProfile', JSON.stringify(userProfile)); }, [userProfile]);

      const addRecord = (materialId, durationSeconds, customDateStr = null) => {
        let recordDate = new Date();
        if (customDateStr) { recordDate = new Date(`${customDateStr}T12:00:00`); }
        const newRecord = { id: Date.now().toString(), materialId, durationSeconds, date: recordDate.toISOString() };
        setRecords([newRecord, ...records]);
      };

      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard': return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} userProfile={userProfile} />;
          case 'record': return <Record materials={materials} addRecord={addRecord} />;
          case 'calendar': return <Calendar records={records} materials={materials} events={events} setEvents={setEvents} />;
          case 'materials': return <MaterialsManager materials={materials} setMaterials={setMaterials} />;
          case 'settings': return <Settings records={records} setRecords={setRecords} materials={materials} setMaterials={setMaterials} goal={weeklyGoalHours} setGoal={setWeeklyGoalHours} userProfile={userProfile} setUserProfile={setUserProfile} />;
          default: return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} userProfile={userProfile} />;
        }
      };

      return (
        <div className="flex flex-col md:flex-row h-screen overflow-hidden">
          <nav className="glass-effect border-r md:w-64 flex-shrink-0 flex md:flex-col justify-between md:justify-start p-2 md:p-4 z-20 shadow-sm md:shadow-none order-last md:order-first border-t md:border-t-0">
            <div className="hidden md:flex items-center gap-3 mb-8 px-4 mt-4">
              <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                <Icon name="book-open" size={24} />
              </div>
              <h1 className="text-xl font-bold tracking-tight text-slate-800">Study Log</h1>
            </div>

            <div className="flex md:flex-col w-full justify-around md:justify-start gap-1 md:gap-2">
              {[
                { id: 'dashboard', icon: 'layout-dashboard', label: 'ホーム' },
                { id: 'record', icon: 'clock', label: '記録' },
                { id: 'calendar', icon: 'calendar', label: 'カレンダー' },
                { id: 'materials', icon: 'library', label: '教材管理' },
                { id: 'settings', icon: 'settings', label: '設定・提出' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-4 rounded-2xl transition-all ${
                    activeTab === tab.id ? 'bg-indigo-50 text-indigo-700 font-bold shadow-sm' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'
                  }`}
                >
                  <Icon name={tab.icon} size={22} className={activeTab === tab.id ? 'text-indigo-600' : ''} />
                  <span className="text-[10px] md:text-sm">{tab.label}</span>
                </button>
              ))}
            </div>
          </nav>

          <main className="flex-1 overflow-y-auto bg-slate-50/50 p-4 md:p-8 relative">
            <div className="max-w-5xl mx-auto pb-20 md:pb-0">
              {renderContent()}
            </div>
          </main>
        </div>
      );
    }

    // --- グラフコンポーネント ---
    function StudyChart({ records, materials }) {
      const [view, setView] = useState('daily');
      const [offset, setOffset] = useState(0);

      useEffect(() => { setOffset(0); }, [view]);

      const chartData = useMemo(() => {
        if (view === 'daily') {
          const days = [];
          const DISPLAY_DAYS = 7;
          for(let i = DISPLAY_DAYS - 1; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - (offset * DISPLAY_DAYS + i));
            days.push(d);
          }
          return days.map(d => {
            const dateStr = getLocalDateString(d);
            const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);
            let total = 0; const subjects = {}; SUBJECTS.forEach(s => subjects[s] = 0);
            dayRecords.forEach(r => {
              const mat = materials.find(m => m.id === r.materialId);
              const sub = mat ? mat.subject : 'その他';
              if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;
              total += r.durationSeconds;
            });
            const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
            return { label: `${d.getMonth()+1}/${d.getDate()}(${dayOfWeek})`, total, subjects };
          });
        } else {
          const weeks = []; 
          const DISPLAY_WEEKS = 5;
          for(let i = DISPLAY_WEEKS - 1; i >= 0; i--) {
            const now = new Date();
            const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
            const targetWeekIndex = offset * DISPLAY_WEEKS + i;

            const endOfWeek = new Date(now); 
            endOfWeek.setDate(now.getDate() - dayOfWeek + 6 - (targetWeekIndex * 7));
            const startOfWeek = new Date(endOfWeek); 
            startOfWeek.setDate(endOfWeek.getDate() - 6);

            const startStr = getLocalDateString(startOfWeek); 
            const endStr = getLocalDateString(endOfWeek);
            const weekRecords = records.filter(r => { const rDate = getLocalDateString(r.date); return rDate >= startStr && rDate <= endStr; });
            let total = 0; const subjects = {}; SUBJECTS.forEach(s => subjects[s] = 0);
            weekRecords.forEach(r => {
              const mat = materials.find(m => m.id === r.materialId);
              const sub = mat ? mat.subject : 'その他';
              if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;
              total += r.durationSeconds;
            });
            
            let label = '';
            if (targetWeekIndex === 0) label = '今週';
            else if (targetWeekIndex === 1) label = '先週';
            else label = `${startOfWeek.getMonth()+1}/${startOfWeek.getDate()}~`;

            weeks.push({ label, total, subjects });
          }
          return weeks;
        }
      }, [records, materials, view, offset]);

      const maxTotalSec = Math.max(...chartData.map(d => d.total), 3600);
      const maxHours = Math.max(Math.ceil(maxTotalSec / 3600), 3);
      const step = Math.ceil(maxHours / 4) || 1;
      const topHour = Math.ceil(maxHours / step) * step;
      
      const yAxisLabels = [];
      for (let i = topHour; i >= 0; i -= step) { yAxisLabels.push(i); }
      const adjustedMaxVal = topHour * 3600;

      const handlePrev = () => setOffset(o => o + 1);
      const handleNext = () => setOffset(o => Math.max(0, o - 1));

      return (
        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100 animate-in fade-in mt-6">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold text-slate-800">学習時間の推移</h3>
            <div className="flex bg-slate-100 rounded-lg p-1">
              <button onClick={()=>setView('daily')} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${view==='daily'?'bg-white shadow-sm text-indigo-600':'text-slate-500'}`}>日別</button>
              <button onClick={()=>setView('weekly')} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${view==='weekly'?'bg-white shadow-sm text-indigo-600':'text-slate-500'}`}>週別</button>
            </div>
          </div>

          <div className="flex justify-between items-center mb-6 bg-slate-50/50 p-2 rounded-xl border border-slate-100">
            <button onClick={handlePrev} className="p-2 hover:bg-slate-200 rounded-lg transition-colors flex items-center gap-1 text-slate-600 text-sm font-bold">
              <Icon name="chevron-left" size={18} /> <span className="hidden sm:inline">先週</span>
            </button>
            <span className="text-sm font-bold text-slate-600 tracking-wide">
              {view === 'daily' 
                ? `${chartData[0].label.split('(')[0]} 〜 ${chartData[chartData.length-1].label.split('(')[0]}`
                : `${offset === 0 ? '直近5週間' : `${chartData[0].label} 〜 ${chartData[chartData.length-1].label}`}`
              }
            </span>
            <button onClick={handleNext} disabled={offset === 0} className={`p-2 rounded-lg transition-colors flex items-center gap-1 text-sm font-bold ${offset === 0 ? 'text-slate-300' : 'text-slate-600 hover:bg-slate-200'}`}>
              <span className="hidden sm:inline">翌週</span> <Icon name="chevron-right" size={18} />
            </button>
          </div>
          
          <div className="flex h-72 sm:h-80">
            <div className="w-8 md:w-10 flex flex-col justify-between text-[10px] text-slate-400 font-bold pb-8 pt-12 border-r border-slate-200">
              {yAxisLabels.map(h => (
                <div key={h} className="text-right pr-2 transform translate-y-1.5">{h}h</div>
              ))}
            </div>
            
            <div className="flex-1 relative">
              <div className="absolute inset-0 flex flex-col justify-between pointer-events-none pb-8 pt-12">
                {yAxisLabels.map((h, i) => (
                  <div key={h} className={`border-t w-full ${i === yAxisLabels.length - 1 ? 'border-transparent' : 'border-slate-100 border-dashed'}`}></div>
                ))}
              </div>

              <div className="h-full w-full flex items-end pb-8 pt-12 relative z-10 justify-around px-2 sm:px-6">
                {chartData.map((d, i) => {
                  const heightPercent = adjustedMaxVal > 0 ? (d.total / adjustedMaxVal) * 100 : 0;
                  return (
                    <div key={i} className="flex flex-col items-center justify-end h-full w-10 sm:w-12 group relative">
                      <div className="absolute bottom-full mb-2 bg-slate-800 text-white text-xs p-2.5 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50">
                        <p className="font-bold text-center border-b border-slate-600 pb-1.5 mb-1.5">{d.label} : {(d.total/3600).toFixed(1)}h</p>
                        {SUBJECTS.map(sub => d.subjects[sub] > 0 && (
                          <div key={sub} className="flex items-center gap-1.5 mb-1 last:mb-0">
                            <span className="w-2 h-2 rounded-full" style={{backgroundColor: SUBJECT_COLORS[sub]}}></span>
                            <span className="font-medium text-[10px]">{sub}: {(d.subjects[sub]/3600).toFixed(1)}h</span>
                          </div>
                        ))}
                      </div>

                      <div className="w-full flex flex-col-reverse rounded-t-md overflow-hidden min-h-[4px] shadow-sm cursor-pointer hover:brightness-110 transition-all duration-700 ease-out bg-slate-50" style={{ height: `${heightPercent}%` }}>
                        {SUBJECTS.map(sub => {
                          const h = d.total > 0 ? (d.subjects[sub] / d.total) * 100 : 0;
                          if (h === 0) return null;
                          return <div key={sub} style={{ height: `${h}%`, backgroundColor: SUBJECT_COLORS[sub] }} className="w-full transition-all border-b border-black/5 last:border-0"></div>
                        })}
                      </div>

                      <span className="absolute -bottom-6 text-[9px] sm:text-[10px] text-slate-500 font-bold whitespace-nowrap">{d.label}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="flex flex-wrap gap-4 mt-8 justify-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
            {SUBJECTS.map(sub => (
              <div key={sub} className="flex items-center gap-1.5">
                <span className="w-3.5 h-3.5 rounded-full shadow-sm" style={{backgroundColor: SUBJECT_COLORS[sub]}}></span>
                <span className="text-xs font-bold text-slate-700">{sub}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- 1. ダッシュボード ---
    function Dashboard({ records, materials, goal, setTab, userProfile }) {
      const today = getLocalDateString(new Date());
      const stats = useMemo(() => {
        let todaySec = 0, weekSec = 0, totalSec = 0;
        const now = new Date();
        const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
        const monday = new Date(now); monday.setDate(now.getDate() - dayOfWeek);
        const mondayStr = getLocalDateString(monday);

        records.forEach(r => {
          totalSec += r.durationSeconds;
          const rDate = getLocalDateString(r.date);
          if (rDate === today) todaySec += r.durationSeconds;
          if (rDate >= mondayStr) weekSec += r.durationSeconds;
        });
        return { todaySec, weekSec, totalSec };
      }, [records, materials, today]);

      const formatH = (s) => (s / 3600).toFixed(1);
      const weekProgress = Math.min((stats.weekSec / 3600) / goal * 100, 100);

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="flex items-center justify-between mb-2">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">ダッシュボード</h2>
              {userProfile.name && <p className="text-sm text-slate-500 font-bold mt-1">ようこそ、{userProfile.name} さん</p>}
            </div>
            <button onClick={() => setTab('record')} className="bg-indigo-600 text-white px-5 py-2.5 rounded-full font-bold shadow-md hover:bg-indigo-700 flex items-center gap-2 text-sm transition-transform active:scale-95">
              <Icon name="plus-circle" size={18} /> 記録をつける
            </button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3 mb-2"><div className="bg-orange-100 p-2 rounded-xl text-orange-600"><Icon name="sun" size={20} /></div><p className="text-sm font-bold text-slate-500">今日</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.todaySec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3 mb-2"><div className="bg-blue-100 p-2 rounded-xl text-blue-600"><Icon name="calendar-days" size={20} /></div><p className="text-sm font-bold text-slate-500">今週</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.weekSec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 col-span-2 md:col-span-1">
              <div className="flex items-center gap-3 mb-2"><div className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><Icon name="award" size={20} /></div><p className="text-sm font-bold text-slate-500">累計</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.totalSec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div className="flex justify-between items-end mb-4">
              <h3 className="font-bold text-slate-800">今週の目標達成率</h3>
              <span className="text-sm text-slate-500 font-bold">{formatH(stats.weekSec)} / {goal} 時間</span>
            </div>
            <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden">
              <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000 ease-out relative" style={{ width: `${weekProgress}%` }}>
                <div className="absolute inset-0 bg-white/20 w-full h-full" style={{ backgroundImage: 'linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent)', backgroundSize: '1rem 1rem' }}></div>
              </div>
            </div>
          </div>

          <StudyChart records={records} materials={materials} />
        </div>
      );
    }

    // --- 2. 記録・タイマー ---
    function Record({ materials, addRecord }) {
      const [mode, setMode] = useState('timer');
      const [time, setTime] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const [selectedMaterialId, setSelectedMaterialId] = useState('');
      const intervalRef = useRef(null);

      const [manualDate, setManualDate] = useState(getLocalDateString(new Date()));
      const [manualMaterialId, setManualMaterialId] = useState('');
      const [manualHours, setManualHours] = useState('');
      const [manualMinutes, setManualMinutes] = useState('');

      useEffect(() => {
        if (isRunning) { intervalRef.current = setInterval(() => setTime(t => t + 1), 1000); } 
        else { clearInterval(intervalRef.current); }
        return () => clearInterval(intervalRef.current);
      }, [isRunning]);

      const toggleTimer = () => {
        if (!selectedMaterialId) return alert("学習する教材を選択してください");
        setIsRunning(!isRunning);
      };

      const stopTimer = () => {
        setIsRunning(false);
        if (time > 60) {
          addRecord(selectedMaterialId, time);
          alert("記録を保存しました！");
        } else if (time > 0) {
          alert("1分未満のため記録されませんでした");
        }
        setTime(0);
      };

      const handleManualSubmit = (e) => {
        e.preventDefault();
        if (!manualMaterialId) return alert('教材を選択してください');
        const h = parseInt(manualHours || 0); const m = parseInt(manualMinutes || 0);
        const totalSec = (h * 3600) + (m * 60);
        if (totalSec <= 0) return alert('学習時間を入力してください');
        
        addRecord(manualMaterialId, totalSec, manualDate);
        alert('手動で記録を追加しました！');
        setManualHours(''); setManualMinutes('');
      };

      const formatTime = (sec) => {
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      return (
        <div className="max-w-md mx-auto mt-4 animate-in slide-in-from-bottom-4 duration-500">
          <div className="flex bg-slate-200 p-1.5 rounded-2xl mb-8 shadow-inner">
            <button onClick={()=>setMode('timer')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='timer' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>タイマーで計る</button>
            <button onClick={()=>setMode('manual')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='manual' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>手動で入力</button>
          </div>

          {mode === 'timer' ? (
            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 text-center relative overflow-hidden">
              <div className={`absolute inset-0 bg-indigo-500 opacity-5 transition-opacity ${isRunning ? 'animate-pulse' : 'hidden'}`}></div>
              <h2 className="text-xl font-bold text-slate-800 mb-8 relative z-10 flex items-center justify-center gap-2">
                <Icon name="timer" size={20} className="text-indigo-500" /> 学習タイマー
              </h2>
              <select 
                value={selectedMaterialId} onChange={(e) => setSelectedMaterialId(e.target.value)} disabled={isRunning}
                className="w-full p-4 mb-8 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none transition-all disabled:opacity-50 relative z-10"
              >
                <option value="">教材を選択...</option>
                {materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}
              </select>
              <div className="text-6xl md:text-7xl font-black text-slate-800 tracking-wider font-mono my-12 relative z-10 drop-shadow-sm">{formatTime(time)}</div>
              <div className="flex justify-center gap-6 relative z-10">
                <button onClick={toggleTimer} className={`w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg transition-transform hover:scale-105 active:scale-95 ${isRunning ? 'bg-amber-500' : 'bg-indigo-600'}`}>
                  <Icon name={isRunning ? "pause" : "play"} size={36} className={isRunning ? "" : "ml-2"} />
                </button>
                <button onClick={stopTimer} disabled={time === 0} className="w-20 h-20 rounded-full flex items-center justify-center bg-slate-800 text-white shadow-lg hover:bg-slate-900 transition-transform hover:scale-105 active:scale-95 disabled:opacity-30 disabled:hover:scale-100">
                  <Icon name="square" size={28} />
                </button>
              </div>
            </div>
          ) : (
            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 relative overflow-hidden">
              <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <Icon name="pen-tool" size={20} className="text-indigo-500" /> 手動で記録
              </h2>
              <form onSubmit={handleManualSubmit} className="space-y-5">
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">日付</label>
                  <input type="date" value={manualDate} onChange={e=>setManualDate(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">教材</label>
                  <select value={manualMaterialId} onChange={e=>setManualMaterialId(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required>
                    <option value="">選択してください...</option>
                    {materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}
                  </select>
                </div>
                <div className="flex gap-4">
                  <div className="flex-1">
                    <label className="block text-sm font-bold text-slate-600 mb-2">時間</label>
                    <div className="flex items-center gap-2 bg-slate-50 border-2 border-slate-100 rounded-2xl px-4">
                      <input type="number" min="0" value={manualHours} onChange={e=>setManualHours(e.target.value)} className="w-full py-4 bg-transparent text-center font-bold text-xl outline-none" placeholder="0" />
                      <span className="font-bold text-slate-400">h</span>
                    </div>
                  </div>
                  <div className="flex-1">
                    <label className="block text-sm font-bold text-slate-600 mb-2">分</label>
                    <div className="flex items-center gap-2 bg-slate-50 border-2 border-slate-100 rounded-2xl px-4">
                      <input type="number" min="0" max="59" value={manualMinutes} onChange={e=>setManualMinutes(e.target.value)} className="w-full py-4 bg-transparent text-center font-bold text-xl outline-none" placeholder="0" />
                      <span className="font-bold text-slate-400">m</span>
                    </div>
                  </div>
                </div>
                <button type="submit" className="w-full mt-4 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-transform active:scale-95 flex items-center justify-center gap-2">
                  <Icon name="check-circle" size={20} /> 記録を保存する

    // --- 3. カレンダー ---
    function Calendar({ records, materials, events, setEvents }) {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [newEventTitle, setNewEventTitle] = useState('');
      const [newEventDesc, setNewEventDesc] = useState('');
      const [newEventDate, setNewEventDate] = useState(getLocalDateString(new Date()));
      const [newEventColor, setNewEventColor] = useState(EVENT_COLORS[0].color);
      const [selectedEvent, setSelectedEvent] = useState(null);
      
      const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
      const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
      const timerRef = useRef(null);

      const openEventModal = (dateStr) => {
        setNewEventDate(dateStr || getLocalDateString(new Date())); 
        setNewEventTitle(''); 
        setNewEventDesc(''); 
        setNewEventColor(EVENT_COLORS[0].color); 
        setIsModalOpen(true);
      };
      const closeEventModal = () => setIsModalOpen(false);

      const addEvent = (e) => {
        e.preventDefault();
        if(!newEventTitle) return;
        setEvents([...events, { id: Date.now().toString(), title: newEventTitle, description: newEventDesc, date: newEventDate, color: newEventColor }]);
        closeEventModal();
      };
      
      const deleteEvent = (id) => { 
        if(confirm('この予定を削除しますか？')) { 
          setEvents(events.filter(ev => ev.id !== id)); 
          setSelectedEvent(null); 
        } 
      };
      
      const handleEventClick = (ev, e) => { 
        e.stopPropagation(); 
        setSelectedEvent(ev); 
      };

      const handlePointerDown = (e, dateStr) => {
        if (e.type === 'mousedown' && e.button !== 0) return;
        timerRef.current = setTimeout(() => { openEventModal(dateStr); }, 500); // 長押しでモーダルを開く
      };
      
      const handlePointerUp = () => { 
        clearTimeout(timerRef.current); 
      };

      const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));

      return (
        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100 animate-in fade-in">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold text-slate-800">カレンダー</h2>
            <div className="flex items-center gap-4 bg-slate-50 p-1.5 rounded-xl border border-slate-100">
              <button onClick={prevMonth} className="p-2 hover:bg-slate-200 rounded-lg transition-colors"><Icon name="chevron-left" size={20} className="text-slate-600" /></button>
              <span className="font-bold text-slate-700 min-w-[100px] text-center">{currentDate.getFullYear()}年 {currentDate.getMonth() + 1}月</span>
              <button onClick={nextMonth} className="p-2 hover:bg-slate-200 rounded-lg transition-colors"><Icon name="chevron-right" size={20} className="text-slate-600" /></button>
            </div>
          </div>

          <div className="grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 rounded-xl overflow-hidden">
            {['日', '月', '火', '水', '木', '金', '土'].map(day => (
              <div key={day} className="bg-slate-50 py-2 text-center text-xs font-bold text-slate-500">{day}</div>
            ))}
            
            {Array.from({ length: firstDayOfMonth }).map((_, i) => (
              <div key={`empty-${i}`} className="bg-slate-50/50 min-h-[80px] p-2"></div>
            ))}
            
            {Array.from({ length: daysInMonth }).map((_, i) => {
              const date = i + 1;
              const dateStr = getLocalDateString(new Date(currentDate.getFullYear(), currentDate.getMonth(), date));
              const dayEvents = events.filter(e => e.date === dateStr);
              const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);
              const totalSec = dayRecords.reduce((acc, r) => acc + r.durationSeconds, 0);
              const isToday = dateStr === getLocalDateString(new Date());

              return (
                <div 
                  key={date} 
                  className="bg-white min-h-[80px] p-1.5 flex flex-col no-callout cursor-pointer hover:bg-indigo-50/30 transition-colors"
                  onPointerDown={(e) => handlePointerDown(e, dateStr)}
                  onPointerUp={handlePointerUp}
                  onPointerLeave={handlePointerUp}
                  onClick={() => openEventModal(dateStr)}
                >
                  <div className="flex justify-between items-start mb-1">
                    <span className={`text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full ${isToday ? 'bg-indigo-600 text-white' : 'text-slate-700'}`}>{date}</span>
                    {totalSec > 0 && <span className="text-[10px] text-indigo-600 font-bold bg-indigo-50 px-1.5 py-0.5 rounded-md">{(totalSec/3600).toFixed(1)}h</span>}
                  </div>
                  <div className="flex-1 space-y-1 overflow-y-auto no-scrollbar max-h-16">
                    {dayEvents.map(ev => (
                      <div key={ev.id} onClick={(e) => handleEventClick(ev, e)} className="text-[10px] p-1 rounded-md text-white truncate shadow-sm font-medium" style={{backgroundColor: ev.color}}>
                        {ev.title}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          <p className="text-xs text-slate-400 mt-4 text-right font-medium">※日付を長押し（またはクリック）で予定を追加</p>

          {/* 予定追加モーダル */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-xl animate-in zoom-in-95 duration-200">
                <h3 className="font-bold text-lg mb-4 text-slate-800">予定を追加</h3>
                <form onSubmit={addEvent} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">日付</label>
                    <input type="date" value={newEventDate} onChange={e=>setNewEventDate(e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none" required />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">タイトル</label>
                    <input type="text" value={newEventTitle} onChange={e=>setNewEventTitle(e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none" required />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2">カラー</label>
                    <div className="flex flex-wrap gap-2">
                      {EVENT_COLORS.map(c => (
                        <button type="button" key={c.id} onClick={() => setNewEventColor(c.color)} className={`w-8 h-8 rounded-full shadow-sm transition-transform ${newEventColor === c.color ? 'ring-2 ring-offset-2 ring-slate-400 scale-110' : ''}`} style={{backgroundColor: c.color}}></button>
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-2 mt-6">
                    <button type="button" onClick={closeEventModal} className="flex-1 p-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors">キャンセル</button>
                    <button type="submit" className="flex-1 p-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md">追加</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 予定詳細モーダル */}
          {selectedEvent && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={() => setSelectedEvent(null)}>
              <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-xl animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                <div className="flex items-center gap-3 mb-4">
                  <span className="w-4 h-4 rounded-full shadow-sm" style={{backgroundColor: selectedEvent.color}}></span>
                  <h3 className="font-bold text-lg text-slate-800">{selectedEvent.title}</h3>
                </div>
                <p className="text-sm text-slate-500 mb-6 font-medium">{selectedEvent.date.replace(/-/g, '/')}</p>
                <div className="flex gap-2">
                  <button onClick={() => setSelectedEvent(null)} className="flex-1 p-3 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">閉じる</button>
                  <button onClick={() => deleteEvent(selectedEvent.id)} className="flex-1 p-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 transition-colors shadow-md">削除</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- 4. 教材管理 ---
    function MaterialsManager({ materials, setMaterials }) {
      const [name, setName] = useState('');
      const [subject, setSubject] = useState(SUBJECTS[0]);

      const addMaterial = (e) => {
        e.preventDefault();
        if (!name) return;
        setMaterials([...materials, { id: Date.now().toString(), name, subject }]);
        setName('');
      };

      const deleteMaterial = (id) => {
        if (confirm('この教材を削除しますか？\n※関連する学習記録は削除されませんが、グラフ等の表示が「その他」になる場合があります。')) {
          setMaterials(materials.filter(m => m.id !== id));
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in">
          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
              <Icon name="library" className="text-indigo-500" /> 教材の追加
            </h2>
            <form onSubmit={addMaterial} className="flex flex-col md:flex-row gap-4">
              <select value={subject} onChange={e=>setSubject(e.target.value)} className="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 outline-none w-full md:w-1/4">
                {SUBJECTS.map(sub => <option key={sub} value={sub}>{sub}</option>)}
              </select>
              <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="教材名（例：青チャート、NextStage）" className="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 outline-none flex-1" required />
              <button type="submit" className="bg-indigo-600 text-white font-bold p-3 rounded-xl shadow-md hover:bg-indigo-700 transition-colors md:w-auto w-full flex justify-center items-center gap-2">
                <Icon name="plus" size={20} /> 追加
              </button>
            </form>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2">
              <Icon name="list" className="text-indigo-500" /> 登録済みの教材一覧
            </h3>
            {materials.length === 0 ? (
              <p className="text-slate-400 text-center py-8 font-medium">教材が登録されていません</p>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {materials.map(m => (
                  <div key={m.id} className="bg-slate-50 border border-slate-200 p-4 rounded-2xl flex justify-between items-center group transition-colors hover:border-indigo-200">
                    <div>
                      <span className="text-[10px] font-bold px-2 py-1 rounded-md text-white mb-2 inline-block shadow-sm" style={{backgroundColor: SUBJECT_COLORS[m.subject]}}>{m.subject}</span>
                      <p className="font-bold text-slate-700">{m.name}</p>
                    </div>
                    <button onClick={() => deleteMaterial(m.id)} className="text-slate-400 hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-red-50">
                      <Icon name="trash-2" size={18} />
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- 5. 設定・提出（Google Form連携） ---
    function Settings({ records, goal, setGoal, userProfile, setUserProfile, materials }) {
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitSuccess, setSubmitSuccess] = useState(false);

      const handleProfileChange = (e) => {
        setUserProfile({ ...userProfile, [e.target.name]: e.target.value });
      };

      // --- 今日の学習記録を集計 ---
      const todayStr = getLocalDateString(new Date());
      const todayRecords = records.filter(r => getLocalDateString(r.date) === todayStr);
      
      const subjectsTotalSec = { '英語': 0, '国語': 0, '数学': 0, '理科': 0, '社会': 0, 'その他': 0 };
      let totalSeconds = 0;
      
      todayRecords.forEach(r => {
        const mat = materials.find(m => m.id === r.materialId);
        const sub = mat ? mat.subject : 'その他';
        if (subjectsTotalSec[sub] !== undefined) {
            subjectsTotalSec[sub] += r.durationSeconds;
        } else {
            subjectsTotalSec['その他'] += r.durationSeconds;
        }
        totalSeconds += r.durationSeconds;
      });

      // 秒を分に変換（Google Formの単位が「分」であるため）
      const getMinutes = (sec) => Math.floor(sec / 60);
      const totalMinutes = getMinutes(totalSeconds);

      // --- Google Formへ送信 ---
      const submitToGoogleForm = async () => {
        // バリデーション
        if (!userProfile.grade || !userProfile.classNum || !userProfile.studentNum || !userProfile.name) {
          return alert('基本情報（学年、組、出席番号、氏名）をすべて入力してください。');
        }
        if (totalMinutes === 0 && !confirm('今日の学習時間が0分ですが、このまま送信しますか？')) {
          return;
        }

        setIsSubmitting(true);
        setSubmitSuccess(false);

        // 指定されたGoogle Formのエンドポイント
        const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLScLTYwuG2p0nXrrSkfoTH08moCs4tgwrQJKwym4F2ylohHDug/formResponse";
        const formData = new URLSearchParams();
        
        // 基本情報
        formData.append('entry.1119124569', userProfile.grade);
        formData.append('entry.183805390', userProfile.classNum);
        formData.append('entry.381405597', userProfile.studentNum);
        formData.append('entry.322289790', userProfile.name);
        
        // 合計時間
        formData.append('entry.1196976546', totalMinutes.toString());
        
        // 各科目の時間
        formData.append('entry.1599272747', getMinutes(subjectsTotalSec['英語']).toString());
        formData.append('entry.491252079', getMinutes(subjectsTotalSec['国語']).toString());
        formData.append('entry.301365365', getMinutes(subjectsTotalSec['数学']).toString());
        formData.append('entry.1971877324', getMinutes(subjectsTotalSec['理科']).toString());
        formData.append('entry.1130548948', getMinutes(subjectsTotalSec['社会']).toString());
        formData.append('entry.1068639816', getMinutes(subjectsTotalSec['その他']).toString());

        try {
          // CORSの制限を回避するため mode: 'no-cors' を使用
          await fetch(formUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
          });
          
          // no-cors の場合、正確なステータスコードは取れないが、ネットワークエラーが起きなければ成功とみなす
          setSubmitSuccess(true);
          setTimeout(() => setSubmitSuccess(false), 5000); // 5秒後にメッセージを消す
        } catch (error) {
          console.error("送信エラー:", error);
          alert('通信エラーが発生しました。インターネット接続を確認してください。');
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in">
          {/* 送信成功メッセージ */}
          {submitSuccess && (
            <div className="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-2xl relative flex items-center gap-3 shadow-sm mb-6" role="alert">
              <Icon name="check-circle" className="text-green-500" />
              <div>
                <strong className="font-bold block">送信完了！</strong>
                <span className="block sm:inline text-sm">今日の学習記録をGoogleフォームに送信しました。お疲れ様でした！</span>
              </div>
            </div>
          )}

          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-slate-100 pb-4">
              <Icon name="send" className="text-indigo-500" /> 今日の記録を提出
            </h2>
            
            <div className="bg-slate-50 rounded-2xl p-4 mb-6 border border-slate-200">
              <p className="text-sm font-bold text-slate-500 mb-4 text-center">本日の学習時間（単位：分）</p>
              <div className="grid grid-cols-3 sm:grid-cols-6 gap-2 text-center mb-4">
                {SUBJECTS.map(sub => (
                  <div key={sub} className="bg-white p-2 rounded-xl border border-slate-100 shadow-sm">
                    <p className="text-[10px] font-bold text-slate-400 mb-1">{sub}</p>
                    <p className="font-black text-slate-700">{getMinutes(subjectsTotalSec[sub])}</p>
                  </div>
                ))}
              </div>
              <div className="flex justify-between items-center bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                <span className="font-bold text-indigo-800">合計時間</span>
                <span className="text-2xl font-black text-indigo-600">{totalMinutes} <span className="text-sm font-bold">分</span></span>
              </div>
            </div>

            <button 
              onClick={submitToGoogleForm} 
              disabled={isSubmitting}
              className={`w-full font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-all duration-300 ${
                isSubmitting ? 'bg-slate-400 text-white cursor-wait' : 'bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95 hover:shadow-xl'
              }`}
            >
              {isSubmitting ? (
                <><div className="loader rounded-full border-2 border-t-2 border-white h-5 w-5 mr-2"></div> 送信中...</>
              ) : (
                <><Icon name="paperclip" size={20} /> 学習記録をGoogleフォームに送信する</>
              )}
            </button>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 mt-6">
            <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-slate-100 pb-4">
              <Icon name="user" className="text-indigo-500" /> 基本情報設定（自動保存）
            </h2>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              <div>
                <label className="block text-xs font-bold text-slate-500 mb-2">学年</label>
                <input type="number" name="grade" value={userProfile.grade} onChange={handleProfileChange} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-400 transition-colors" placeholder="例: 1" />
              </div>
              <div>
                <label className="block text-xs font-bold text-slate-500 mb-2">組</label>
                <input type="number" name="classNum" value={userProfile.classNum} onChange={handleProfileChange} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-400 transition-colors" placeholder="例: 2" />
              </div>
              <div>
                <label className="block text-xs font-bold text-slate-500 mb-2">出席番号</label>
                <input type="number" name="studentNum" value={userProfile.studentNum} onChange={handleProfileChange} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-400 transition-colors" placeholder="例: 15" />
              </div>
              <div className="col-span-2 md:col-span-1">
                <label className="block text-xs font-bold text-slate-500 mb-2">氏名</label>
                <input type="text" name="name" value={userProfile.name} onChange={handleProfileChange} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-400 transition-colors" placeholder="山田 太郎" />
              </div>
            </div>

            <h3 className="font-bold text-slate-800 mb-4 mt-8 flex items-center gap-2">
              <Icon name="target" className="text-indigo-500" size={18} /> 目標設定
            </h3>
            <div>
              <label className="block text-xs font-bold text-slate-500 mb-2">週の目標学習時間 (時間)</label>
              <input type="number" min="1" value={goal} onChange={e=>setGoal(Number(e.target.value))} className="w-full md:w-1/3 p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-400 transition-colors" />
            </div>
          </div>
        </div>
      );
    }

    // --- Reactマウント ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
